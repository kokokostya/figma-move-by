<!DOCTYPE html>
<html>
  <head>
    <style>
      *, html, body {
        box-sizing: border-box;
        overflow: hidden;
      }

      body {
        font-family: Inter, sans-serif;
        margin: 16px;
        color: #111;
      }

      .inputs {
        display: flex;
        gap: 8px;
      }

      .input-wrapper {
        position: relative;
        flex: 1;
      }

      .input-wrapper .icon {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        color: #999;
        pointer-events: none;
      }

      input[type="number"] {
        width: 100%;
        padding: 8px 10px 8px 30px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 13px;
      }

      .history {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .pill {
        padding: 3px 8px;
        border: 1px solid #dde;
        border-radius: 6px;
        background: #d6ebff;
        font-size: 11px;
        color: #333;
        cursor: pointer;
        line-height: 1.4;
      }

      .pill:hover {
        background: #c0e1ff;
        border-color: #ccd;
        color: #111;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
      }

      .checkbox-row input[type="checkbox"] {
        width: auto;
      }

      .checkbox-row label {
        font-size: 13px;
        color: #111;
        cursor: pointer;
      }

      .buttons {
        margin-top: 12px;
      }

      button.primary {
        width: 100%;
        border: none;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
        background: #18a0fb;
        color: white;
      }

      button.primary:hover {
        background: #0893f0;
      }
    </style>
  </head>

  <body>
    <div class="inputs">
      <div class="input-wrapper">
        <span class="icon">
          <svg id="angle-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="transition: transform 0.1s;">
            <path d="M7 12V2M4.5 4.5L7 2L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <input id="angle" type="number" value="0" step="5" />
      </div>
      <div class="input-wrapper">
        <span class="icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 7H12M2 7L4.5 4.5M2 7L4.5 9.5M12 7L9.5 4.5M12 7L9.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <input id="distance" type="number" value="10" step="1" />
      </div>
    </div>

    <div id="history" class="history"></div>

    <div class="checkbox-row">
      <input id="moveCopy" type="checkbox" />
      <label for="moveCopy">Move a copy</label>
    </div>

    <div class="buttons">
      <button class="primary" id="move">Move</button>
    </div>

    <script>
      const angleInput = document.getElementById('angle');
      const distanceInput = document.getElementById('distance');
      const moveCopyInput = document.getElementById('moveCopy');
      const angleIcon = document.getElementById('angle-icon');
      const historyEl = document.getElementById('history');

      function updateAngleIcon(deg) {
        angleIcon.style.transform = `rotate(${deg}deg)`;
      }

      function renderHistory(history) {
        historyEl.innerHTML = '';
        history.forEach(({ angle, distance }) => {
          const pill = document.createElement('button');
          pill.className = 'pill';
          pill.textContent = `${angle}° ▸ ${distance}px`;
          pill.addEventListener('click', () => {
            angleInput.value = angle;
            distanceInput.value = distance;
            updateAngleIcon(angle);
          });
          historyEl.appendChild(pill);
        });
      }

      angleInput.addEventListener('input', () => {
        updateAngleIcon(parseFloat(angleInput.value) || 0);
      });

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;

        if (msg.type === 'init') {
          angleInput.value = msg.angle;
          distanceInput.value = msg.distance;
          moveCopyInput.checked = msg.moveCopy;

          updateAngleIcon(msg.angle);

          if (msg.history && msg.history.length > 0) {
            renderHistory(msg.history);
          }

          distanceInput.focus();
          distanceInput.select();
        }
      };

      function submit() {
        parent.postMessage(
          {
            pluginMessage: {
              type: 'move',
              angle: parseFloat(angleInput.value),
              distance: parseFloat(distanceInput.value),
              moveCopy: moveCopyInput.checked
            }
          },
          '*'
        );
      }

      document
        .getElementById('move')
        .addEventListener('click', submit);

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          submit();
        }

        if (event.key === 'Escape') {
          parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
        }
      });
    </script>
  </body>
</html>
